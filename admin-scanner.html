<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PustakaFlow - Admin Circulation</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Lora', 'serif'],
                    },
                    colors: {
                        navy: {
                            900: '#111827',
                        },
                        silver: {
                            300: '#D1D5DB',
                            400: '#9CA3AF',
                        },
                        mainbg: '#F9FAFB',
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <!-- HTML5-QRCODE Scanner CDN -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        /* Custom overrides for html5-qrcode scanner UI to make it look premium */
        #reader {
            border: none !important;
            padding: 10px !important;
        }

        #reader__dashboard_section_csr button,
        #reader__dashboard_section_swaplink,
        #reader button {
            background-color: #111827 !important;
            /* Navy 900 */
            color: white !important;
            padding: 8px 16px !important;
            border-radius: 8px !important;
            font-size: 0.875rem !important;
            font-weight: 500 !important;
            transition: all 0.2s ease-in-out !important;
            cursor: pointer !important;
            border: 1px solid #1f2937 !important;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05) !important;
        }

        #reader__dashboard_section_csr button:hover,
        #reader__dashboard_section_swaplink:hover,
        #reader button:hover {
            background-color: #374151 !important;
            /* gray 700 */
            border-color: #374151 !important;
        }

        #reader select {
            background-color: #F9FAFB !important;
            border: 1px solid #D1D5DB !important;
            border-radius: 8px !important;
            padding: 8px !important;
            font-size: 0.875rem !important;
            color: #1F2937 !important;
            margin: 10px 0 !important;
            outline: none !important;
        }

        #reader select:focus {
            border-color: #111827 !important;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="css/global.css">
</head>

<body class="flex h-screen overflow-hidden bg-mainbg text-gray-800">

    <!-- Left Sidebar -->
    <aside class="w-64 bg-navy-900 flex-shrink-0 flex flex-col border-r border-gray-800 shadow-lg">
        <!-- Logo / Brand -->
        <div class="h-16 flex items-center px-6 border-b border-gray-800">
            <img src="image/logo.png" alt="PustakaFlow Logo" class="h-8 w-auto">
        </div>

        <!-- Navigation Links -->
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <a href="index.html"
                class="nav-link flex items-center px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-md border border-transparent hover:border-gray-700">
                <span class="text-sm font-medium">Dashboard</span>
            </a>
            <a href="catalog.html"
                class="nav-link flex items-center px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-md border border-transparent hover:border-gray-700">
                <span class="text-sm font-medium">Catalog</span>
            </a>
            <a href="my-library.html"
                class="nav-link flex items-center px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-md border border-transparent hover:border-gray-700">
                <span class="text-sm font-medium">My Library</span>
            </a>
            <!-- Active State -->
            <a href="admin-scanner.html" class="nav-link flex items-center px-4 py-3 text-white bg-gray-800 rounded-md">
                <span class="text-sm font-medium">Barcode Scanner</span>
            </a>
        </nav>

        <!-- Profile / Logout -->
        <div class="p-4 border-t border-gray-800">
            <div class="flex items-center gap-3 px-2">
                <div
                    class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center text-silver-300 font-serif font-bold text-sm border border-gray-600">
                    A
                </div>
                <div class="flex flex-col">
                    <span class="text-sm font-medium text-gray-300">Alex (Member)</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col overflow-hidden bg-mainbg">
        <!-- Topbar -->
        <header class="h-16 bg-white border-b border-gray-200 flex items-center px-8 justify-between shrink-0">
            <h2 class="text-xl font-serif font-medium text-gray-800">Barcode Scanner</h2>
            <div class="flex items-center gap-4">
                <span class="text-sm text-slate-500 font-medium">Database Status Check</span>
            </div>
        </header>

        <!-- Main Centered Content -->
        <div class="flex-1 overflow-y-auto p-8 flex justify-center items-start">

            <!-- Dedicated Scanner Area (Centered, max-w-2xl) -->
            <div class="w-full max-w-2xl flex flex-col gap-6">
                <!-- Scanner Area Card -->
                <div
                    class="bg-white rounded-2xl shadow-sm border border-gray-200 flex flex-col p-8 relative overflow-hidden min-h-[500px]">

                    <!-- Decorative scanner lines -->
                    <div
                        class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-slate-300 to-transparent opacity-50">
                    </div>

                    <div class="mb-6 flex justify-between items-start">
                        <div>
                            <h3 class="text-lg font-medium text-gray-900 flex items-center gap-2">
                                Scan Book Barcode
                            </h3>
                            <p class="text-sm text-gray-500 mt-1">Point your camera at a book's barcode or QR code to
                                verify its real-time library status.</p>
                        </div>
                    </div>

                    <!-- Scanner Container -->
                    <div class="flex-1 flex flex-col items-center justify-start space-y-6 pt-4">
                        <div class="w-full max-w-md relative">
                            <!-- Pulsing Active Indicator -->
                            <div class="mb-4 flex flex-col items-center gap-2" id="scannerIndicator">
                                <span class="relative flex h-3 w-3">
                                    <span
                                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-slate-400 opacity-75"></span>
                                    <span class="relative inline-flex rounded-full h-3 w-3 bg-slate-500"></span>
                                </span>
                                <span class="text-xs font-medium text-slate-500 tracking-wider uppercase">Camera
                                    Active</span>
                            </div>

                            <!-- HTML5 QR Code Reader Feed -->
                            <div id="reader"
                                class="overflow-hidden rounded-xl border border-gray-200 bg-gray-50 shadow-inner"></div>
                            
                            <!-- Custom File Upload Option -->
                            <div class="mt-4 flex flex-col items-center gap-2">
                                <div class="flex items-center gap-2 w-full max-w-xs mb-1">
                                    <div class="h-px bg-gray-200 flex-1"></div>
                                    <span class="text-xs text-gray-400 font-medium uppercase tracking-wider">ATAU</span>
                                    <div class="h-px bg-gray-200 flex-1"></div>
                                </div>
                                <label class="w-full max-w-xs flex justify-center items-center gap-2 px-5 py-2.5 bg-white border border-gray-300 text-gray-700 text-sm font-medium rounded-lg cursor-pointer hover:bg-gray-50 transition-colors shadow-sm focus-within:ring-2 focus-within:ring-navy-900 focus-within:ring-offset-2">
                                    <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                                    Upload Gambar Barcode
                                    <input type="file" id="barcodeFileInput" class="hidden" accept="image/*">
                                </label>
                            </div>
                            
                            <!-- Hidden reader for file scanning -->
                            <div id="hiddenReader" class="hidden"></div>
                        </div>

                        <!-- Scan Status / Book Info Output -->
                        <div id="scanResult" class="w-full max-w-md transition-all duration-300">
                            <!-- Default/Placeholder State -->
                            <div
                                class="p-4 bg-gray-50 border border-gray-100 rounded-xl text-center text-sm text-gray-500">
                                Scan a book barcode/QR code to view database status.
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- External Scripts -->
    <script src="js/global.js" defer></script>
    <script src="js/scanner.js" defer></script>
</body>

</html>
